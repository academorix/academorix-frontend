# Force every transitive `react-stately` resolution to a single version.
# Without this, `@heroui/react` and `@heroui-pro/react` can pull in two
# different `react-stately` versions (3.47.0 + 3.48.0), causing subtle
# duplicate-type errors on `QueuedToast<T>` (each version declares its
# own nominal type) at every `<Toast>` boundary in the workspace.
overrides:
  # Force one esbuild version across the workspace. Without this,
  # pnpm hoists two peer resolutions (0.27.7 + 0.28.1) — each
  # producing a distinct Vite `Plugin<any>` type at build time. That
  # trips TypeScript when a plugin factory from one copy is passed
  # into a `IPluginEntry` typed against the other copy
  # ("Two different types with this name exist").
  # Force one prettier version across the workspace. Without this,
  # `eslint-plugin-prettier`'s peer (`prettier@^3`) resolves to a
  # different minor than the workspace catalog (e.g. 3.5.3 vs 3.9.4),
  # and `prettier-plugin-tailwindcss` crashes with
  # `TypeError: e.charAt is not a function` because its TS parser
  # is loaded from one prettier copy while the format runner is
  # from another.
  prettier: ^3.9.4
  # Force one react + react-dom pair. Without this, pnpm can hoist two
  # copies of React under different peer resolutions — e.g. 19.2.3 and
  # 19.2.7 — and hook calls fail with `Cannot read properties of null
  # (reading 'useState')` because react-dom's react instance differs
  # from the caller's.
  react: 19.2.7
  react-dom: 19.2.7
  react-stately: 3.48.0
