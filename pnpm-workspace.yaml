packages:
  - "apps/*"
  - "packages/*"

# Native deps that ship prebuilt binaries still occasionally need their
# install scripts approved under pnpm v10's secure-by-default policy.
onlyBuiltDependencies:
  - esbuild
  - "@tailwindcss/oxide"
  - "@heroui-pro/react"
  - heroui-pro

# Single source of truth for every dependency version in the workspace.
# Reference these from any package.json with "catalog:".
catalog:
  # --- React ---
  react: ^19.0.0
  react-dom: ^19.0.0
  react-router: ^7.18.1
  "@types/react": ^19.0.0
  "@types/react-dom": ^19.0.0

  # --- HeroUI + styling ---
  "@heroui/react": 3.2.1
  "@heroui/styles": 3.2.1
  "@heroui-pro/react": 1.0.0-beta.6
  "@heroicons/react": ^2.2.0
  tailwindcss: 4.3.1
  "@tailwindcss/vite": 4.3.1
  tailwind-variants: ^3.2.2
  tailwind-merge: ^3.4.0
  motion: ^12.12.0
  react-aria-components: ^1.18.0
  # HeroUI Pro barrel peers (charts, AI/markdown, rich-text, carousel)
  "@number-flow/react": ^0.6.1
  "@tiptap/core": ^3.27.1
  "@tiptap/react": ^3.27.1
  "@tiptap/pm": ^3.27.1
  "@tiptap/starter-kit": ^3.27.1
  "@tiptap/suggestion": ^3.27.1
  "@tiptap/extensions": ^3.27.1
  "@tiptap/extension-link": ^3.27.1
  "@tiptap/extension-underline": ^3.27.1
  embla-carousel: ^8.6.0
  embla-carousel-react: ^8.6.0
  marked: ^18.0.5
  react-markdown: ^10.1.0
  react-resizable-panels: ^4.12.0
  recharts: ^3.9.1
  remark-breaks: ^4.0.0
  remark-gfm: ^4.0.1
  shiki: ^4.3.0
  streamdown: ^2.5.0

  # --- Runtime validation ---
  zod: ^4.4.3

  # --- Refine + data layer ---
  "@refinedev/core": ^5.0.12
  "@refinedev/react-router": ^2.0.4
  "@tanstack/react-query": ^5.101.2
  laravel-echo: ^2.3.7
  pusher-js: ^8.5.0
  openapi-fetch: ^0.17.0
  openapi-typescript: ^7.13.0

  # --- Build toolchain ---
  vite: ^8.1.2
  "@vitejs/plugin-react": ^6.0.3
  typescript: ^5.6.3
  "@types/node": ^22.12.0

  # --- Marketing app (Next.js 16 + React 19 + Tailwind v4) ---
  # Public marketing surface lives in `apps/landing-page` — a Next.js App
  # Router app so the tenant SPA (`apps/web`) stays CSR-only. Next.js is
  # required for SEO-quality prerendering, MDX, and the `next/image`
  # optimizer used for the pricing + landing artwork.
  next: ^16.2.6
  eslint-config-next: ^16.2.0
  "@next/eslint-plugin-next": ^16.2.0
  "@next/bundle-analyzer": ^16.2.6
  next-themes: ^0.4.6
  "@tailwindcss/postcss": 4.3.1
  "@next/mdx": ^16.2.0
  "@types/mdx": ^2.0.13
  "@eslint/compat": ^1.2.8
  "@eslint/eslintrc": ^3.3.1
  clsx: ^2.1.1
  intl-messageformat: ^10.7.16
  # Reserved for Wave 5 (i18n) — locale routing + typed navigation.
  next-intl: ^4.4.0

  # --- Testing ---
  vitest: ^4.1.9
  "@vitest/coverage-v8": ^4.1.9
  "@testing-library/react": ^16.3.2
  "@testing-library/jest-dom": ^6.9.1
  jsdom: ^29.1.1

  # --- Lint / format ---
  eslint: ^9.25.1
  "@eslint/js": ^9.25.1
  typescript-eslint: ^8.31.1
  eslint-config-prettier: ^9.1.0
  eslint-plugin-react: ^7.37.5
  eslint-plugin-react-hooks: ^5.2.0
  eslint-plugin-jsx-a11y: ^6.10.2
  eslint-plugin-import: ^2.31.0
  eslint-plugin-unused-imports: ^4.1.4
  globals: ^16.0.0
  prettier: ^3.9.4
  prettier-plugin-tailwindcss: ^0.8.0

  # --- Monorepo tooling ---
  turbo: ^2.10.2
  knip: ^6.23.0
  husky: ^9.1.7
  lint-staged: ^17.0.8
  "@commitlint/cli": ^21.2.0
  "@commitlint/config-conventional": ^21.2.0
  "@playwright/test": ^1.61.1
  size-limit: ^12.1.0
  "@size-limit/file": ^12.1.0
