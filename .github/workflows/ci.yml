name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level env — inherited by every job unless overridden.
env:
  # Bump Node's heap ceiling to 4 GiB. Vite (rolldown) + Next.js (Turbopack)
  # builds hold the module graph in memory; GitHub's default 8 GB runners
  # can hit V8's ~2.6 GB default limit on cold cache runs and OOM with a
  # non-obvious "JavaScript heap out of memory" trace. 4 GiB gives comfortable
  # headroom without leaving the smaller runner tier.
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  quality:
    name: Format, lint, typecheck, knip
    runs-on: ubuntu-latest
    # Static-analysis job — should never legitimately run more than a few
    # minutes; the cap prevents a hung tool from burning Actions minutes.
    timeout-minutes: 15
    env:
      # `@heroui-pro/react` has a postinstall step that authenticates
      # against the private Pro registry. Without this token, pnpm install
      # silently degrades or fails outright once the postinstall enforces
      # auth — surface any regression here rather than at deploy time.
      HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}
      # Personal token is the alternative auth surface used by the
      # `heroui-pro` CLI; mirror it so both auth paths keep working.
      HEROUI_PERSONAL_TOKEN: ${{ secrets.HEROUI_PERSONAL_TOKEN }}
      # Turborepo remote-cache credentials. When either value is unset
      # (secret/var not configured on the repo), Turbo falls back to the
      # local `.turbo/` cache silently — so this pair is a no-op until
      # the org opts into remote caching.
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4

      # Match .nvmrc + package.json engines (`node: >=22`).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # `packageManager` in package.json pins the exact pnpm version.
        with:
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        # --frozen-lockfile aborts if pnpm-lock.yaml is out of sync with
        # any package.json in the workspace — a rebuild here is always
        # authoritative because we ship the lockfile.
        run: pnpm install --frozen-lockfile

      - name: Prettier format check
        run: pnpm format:check

      - name: ESLint
        # Turbo caches lint output per-package so unchanged packages are a no-op.
        run: pnpm lint

      - name: TypeScript typecheck
        run: pnpm typecheck

      - name: Knip (unused deps / exports)
        run: pnpm knip

      - name: Knip production reachability
        # Second pass with `--production` restricts the reachability graph
        # to production entry points (drops test files + devDependencies).
        # Catches a class of drift the default pass tolerates: a runtime
        # dependency that is only actually imported from a test file. If
        # such a dep exists, prod bundles ship dead weight — this step
        # surfaces it before it lands.
        run: pnpm knip --production

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    # Unit suites run against every workspace package via Turbo fan-out;
    # 20 min gives headroom for a full cold-cache run.
    timeout-minutes: 20
    env:
      # HeroUI Pro auth — same rationale as the `quality` job. `pnpm
      # install` runs here too, so the postinstall needs a token.
      HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}
      HEROUI_PERSONAL_TOKEN: ${{ secrets.HEROUI_PERSONAL_TOKEN }}
      # Turborepo remote-cache — empty values disable it silently.
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Vitest
        # `turbo run test` fans out across every package that declares a
        # `test` script. Fails fast if any suite fails.
        run: pnpm test

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [quality, test]
    # Both apps + every dependent package; 25 min is enough for a fully
    # cold Turbo build with no remote-cache assist.
    timeout-minutes: 25
    env:
      # HeroUI Pro auth — required by the postinstall on `pnpm install`.
      HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}
      HEROUI_PERSONAL_TOKEN: ${{ secrets.HEROUI_PERSONAL_TOKEN }}
      # Turborepo remote-cache — empty values disable it silently.
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # Both apps (dashboard + landing-page) plus every dependent
        # package. Turbo caches per-package output so incremental builds
        # skip unchanged packages.
        run: pnpm build

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    # Skip on draft PRs — Playwright + browser install + build is the most
    # expensive part of the pipeline and drafts explicitly signal "not
    # ready for review". The expression is written so `push` events (merge
    # to main) still run this job: on push there is no `pull_request`
    # payload, so the first clause short-circuits true.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    # Playwright + browser download + full dashboard build; 30 min cap.
    timeout-minutes: 30
    env:
      # HeroUI Pro auth — required by the postinstall on `pnpm install`.
      HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}
      HEROUI_PERSONAL_TOKEN: ${{ secrets.HEROUI_PERSONAL_TOKEN }}
      # Turborepo remote-cache — empty values disable it silently.
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    # E2E is expensive; keep it out of the fast-feedback path but block
    # merges to main until it passes. The `build` dependency ensures the
    # dashboard bundle is present before Playwright serves it.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright
        # The `pnpm e2e` script builds the dashboard first, then runs the
        # Playwright suite against the built assets. If the suite has no
        # tests yet (or the dashboard build fails) this job surfaces it.
        run: pnpm e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          # 7-day retention keeps failure triage cheap on a public repo
          # (per-repo artifact storage counts against the org quota) while
          # still covering a normal weekend + Monday review cycle.
          retention-days: 7
