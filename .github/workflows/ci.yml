name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, typecheck, knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Match .nvmrc + package.json engines (`node: >=22`).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # `packageManager` in package.json pins the exact pnpm version.
        with:
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        # --frozen-lockfile aborts if pnpm-lock.yaml is out of sync with
        # any package.json in the workspace — a rebuild here is always
        # authoritative because we ship the lockfile.
        run: pnpm install --frozen-lockfile

      - name: Prettier format check
        run: pnpm format:check

      - name: ESLint
        # Turbo caches lint output per-package so unchanged packages are a no-op.
        run: pnpm lint

      - name: TypeScript typecheck
        run: pnpm typecheck

      - name: Knip (unused deps / exports)
        run: pnpm knip

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Vitest
        # `turbo run test` fans out across every package that declares a
        # `test` script. Fails fast if any suite fails.
        run: pnpm test

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # Both apps (dashboard + landing-page) plus every dependent
        # package. Turbo caches per-package output so incremental builds
        # skip unchanged packages.
        run: pnpm build

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    # E2E is expensive; keep it out of the fast-feedback path but block
    # merges to main until it passes. The `build` dependency ensures the
    # dashboard bundle is present before Playwright serves it.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright
        # The `pnpm e2e` script builds the dashboard first, then runs the
        # Playwright suite against the built assets. If the suite has no
        # tests yet (or the dashboard build fails) this job surfaces it.
        run: pnpm e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
