<?xml version="1.0" encoding="UTF-8"?>
<!--
  Academorix master brand mark.

  This SVG is the SINGLE SOURCE OF TRUTH for every icon shipped by the SPA:
    - Browser tab favicon (referenced from index.html)
    - Web App Manifest icons (rasterized to PNG via @vite-pwa/assets-generator)
    - Apple touch icon (rasterized to 180×180 PNG)
    - Maskable icon (Android adaptive icons; safe zone = inner 80%)

  Design:
    - 512×512 viewport (matches largest manifest icon size)
    - Full-bleed background in HeroUI Pro's default accent (#0EA5E9 — sky-500)
    - White "A" wordmark, geometrically constructed as two thick strokes plus
      a crossbar. Balanced at the visual center (slightly above geometric
      center to compensate for the crossbar bringing weight to the bottom).
    - Rounded corners for "app-like" feel; safe under maskable clipping too
      because the inner glyph sits well inside the 80% safe zone.

  To regenerate PNG rasters (pwa-64x64.png, pwa-192x192.png, pwa-512x512.png,
  maskable-icon-512x512.png, apple-touch-icon.png):

      pnpm --filter @academorix/dashboard generate-pwa-assets

  Update this master file (colors, glyph, corner radius) and rerun the command
  whenever the brand system moves.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Academorix">
  <title>Academorix</title>

  <!--
    Background: full-bleed rounded square in the brand accent.
    - `rx="112"` gives ~22% corner radius — matches iOS app icon curvature.
    - Fill uses a subtle vertical gradient (top-left highlight → bottom-right
      shade) to add depth without noise.
  -->
  <defs>
    <linearGradient id="academorix-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#academorix-bg)"/>

  <!--
    "A" mark, constructed with two straight strokes and a crossbar.
    Bounds sit inside the 80% maskable safe zone (52 → 460 on both axes ≈ 80%).
    - Left leg:  (170, 396) → (256, 116)
    - Right leg: (342, 396) → (256, 116)
    - Crossbar:  y=296, x from 204 to 308
    Stroke width 48 for weight; joined with `stroke-linecap="round"` so the
    corners read cleanly at 64×64 too.
  -->
  <g fill="none" stroke="#FFFFFF" stroke-width="48" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left leg. -->
    <path d="M170 396 L256 116" />
    <!-- Right leg. -->
    <path d="M342 396 L256 116" />
    <!-- Crossbar. -->
    <path d="M204 296 L308 296" />
  </g>

  <!--
    Small dot on the top of the "A" gives the mark a distinct silhouette at
    small sizes (16×16 favicon) so it doesn't blur into a generic triangle.
  -->
  <circle cx="256" cy="116" r="24" fill="#FFFFFF"/>
</svg>
