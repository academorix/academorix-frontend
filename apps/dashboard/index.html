<!doctype html>
<html lang="en">
  <head>
    <!--
      ============================================================================
      Academorix — Dashboard SPA entrypoint
      ============================================================================

      This file is served for every route by the SPA's fallback rewrite (see
      `vercel.json`). Everything below the `<div id="root">` boots via
      `src/main.tsx` → React 19 → BrowserRouter → Refine.

      ## Ordering of the tags

      1. Character encoding, viewport, `<title>` — must come first so a
         partial-response browser starts rendering with correct metrics.
      2. Icons + web manifest — advertise the installable-app surface.
      3. PWA / mobile-webapp meta hints — theme color, status-bar style,
         Apple compatibility flags. These are read by iOS Safari, Android
         Chrome, and MS Edge on install to decide how the launched app
         should look.
      4. OpenGraph + Twitter Card — social preview when a workspace URL is
         shared. Values are minimal here; the marketing app (`apps/landing-
         page`) owns the rich OG imagery.

      ## Keep in sync with

      - `vite.config.ts` → `VitePWA` manifest `theme_color`, `background_color`
        (same values as the `<meta>` tags below).
      - `public/favicon.svg` → single master vector regenerates every PNG
        raster referenced by `<link rel="apple-touch-icon">` etc.
    -->

    <!-- 1. Charset + viewport (must come first). ---------------------------- -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Academorix</title>
    <meta
      name="description"
      content="Academorix — the operating system for modern academies."
    />

    <!-- 2. Icons + Web App Manifest. ---------------------------------------- -->

    <!--
      Legacy .ico for tab, bookmarks, and Windows tile fallback. Emitted by
      `@vite-pwa/assets-generator` (minimal-2023 preset) from favicon.svg.
    -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />

    <!--
      SVG favicon — served to every modern browser (Chromium 108+, Firefox
      108+, Safari 17+). Scales to any DPI; single source of truth kept in
      /public/favicon.svg.
    -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!--
      Apple touch icon — iOS uses this for the home-screen bookmark. Must be
      a raster PNG (Safari doesn't rasterize SVG for this slot). 180×180 is
      the canonical size Apple recommends.
    -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />

    <!--
      Safari pinned-tab icon — monochrome SVG. Safari re-tints it to the
      `color` attribute when the tab is pinned. Since our favicon.svg is
      full-color, the OS falls back to the tinted glyph automatically.
    -->
    <link rel="mask-icon" href="/favicon.svg" color="#0EA5E9" />

    <!--
      Web App Manifest — generated by vite-plugin-pwa at build time.
      Location matches the plugin default (`/manifest.webmanifest`), served
      with `Content-Type: application/manifest+json` by Vercel/Vite.
    -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- 3. PWA / mobile-webapp hints. --------------------------------------- -->

    <!--
      Theme color — used for the mobile browser chrome tint (Chrome/Edge on
      Android) and for the title bar in an installed PWA on Windows. Kept in
      lock-step with `manifest.theme_color` inside `vite.config.ts`. Values
      per light/dark scheme so users on dark mode don't see a jarring bright
      strip.
    -->
    <meta name="theme-color" content="#0EA5E9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0369A1" media="(prefers-color-scheme: dark)" />

    <!--
      Tell Chromium + Safari the site is capable of running standalone. The
      W3C-standard flag is `mobile-web-app-capable`; `apple-mobile-web-app-
      capable` is the legacy Apple-only spelling still required by older iOS.
    -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!--
      Status-bar treatment when launched from the home screen on iOS.
        - "default"                — black text on white background (light mode).
        - "black"                  — black opaque bar.
        - "black-translucent"      — content bleeds under the status bar.
      "default" keeps our layout intact (no accidental overlap with the safe
      area) while still matching the accent color of the app.
    -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!--
      App title on the iOS home screen. Falls back to the manifest's
      short_name in browsers that support it, but iOS still respects this
      legacy meta.
    -->
    <meta name="apple-mobile-web-app-title" content="Academorix" />

    <!--
      Windows-legacy tile config. Cheap to include; older Edge builds and
      "pin to Start" pick it up. `browserconfig.xml` is optional and we do
      NOT ship one — TileColor alone is enough.
    -->
    <meta name="application-name" content="Academorix" />
    <meta name="msapplication-TileColor" content="#0EA5E9" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!--
      Format-detection off. Prevents mobile Safari from turning strings that
      LOOK like phone numbers into blue tel: links inside our data tables
      (age fields, invoice IDs, etc.).
    -->
    <meta name="format-detection" content="telephone=no,date=no,address=no,email=no" />

    <!--
      Signal our authoritative color scheme so the browser applies the
      matching scrollbar + form-control colours during first paint.
      HeroUI itself flips light/dark by adding `.dark` to `<html>`; this
      hint keeps first-paint from flashing the wrong scrollbar.
    -->
    <meta name="color-scheme" content="light dark" />

    <!-- 4. Social preview (OpenGraph + Twitter). ---------------------------- -->
    <meta property="og:title" content="Academorix" />
    <meta
      property="og:description"
      content="Academorix — the operating system for modern academies."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/pwa-512x512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Academorix" />
    <meta
      name="twitter:description"
      content="Academorix — the operating system for modern academies."
    />
    <meta name="twitter:image" content="/pwa-512x512.png" />
  </head>
  <body class="bg-background text-foreground">
    <!--
      The React root. Everything below the shell lives in `src/`; do NOT add
      other DOM here or React will complain about hydration mismatch on
      first-paint.
    -->
    <div id="root"></div>

    <!--
      Vite's dev + build pipeline treats this script tag as the app entry.
      It is rewritten at build time to the hashed asset URL and injected
      alongside a `<link rel="modulepreload">` for React's runtime.
    -->
    <script type="module" src="/src/main.tsx"></script>

    <!--
      Note: the service worker registration lives inside React (see
      `src/pwa/register-sw.ts`), NOT in an inline `<script>` here. Registering
      inside React is what lets us surface an in-app "Refresh to update"
      toast via `useRegisterSW`. If a `<script>` were injected here, the SW
      would attach before React booted and the `needRefresh` state would be
      lost.
    -->
  </body>
</html>
